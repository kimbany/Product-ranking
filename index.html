<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매크로 키워드 데이터베이스</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .search-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 600px; text-align: center; }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        .input-area { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: #3498db; }
        button { padding: 15px 30px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        #results-area { background: #f9fbfd; padding: 20px; border-radius: 8px; min-height: 20px; font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>

    <div class="search-container">
        <h1>키워드 수집기</h1>
        <div class="input-area">
            <input type="text" id="keyword-input" placeholder="키워드 입력 (예: 강아지 사료, 고양이 간식 등)...">
            <button id="search-btn">저장하기</button>
        </div>
        <div id="results-area">입력한 데이터가 파이어베이스로 전송됩니다.</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // kimbany님이 찾아오신 정확한 프로젝트 설정값
        const firebaseConfig = {
            apiKey: "AIzaSyAtE6SaBaZT0zj47RpfsoigBiKKa8_2S-U",
            authDomain: "product-ranking-64552.firebaseapp.com",
            databaseURL: "https://product-ranking-64552-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "product-ranking-64552",
            storageBucket: "product-ranking-64552.firebasestorage.app",
            messagingSenderId: "456238595132",
            appId: "1:456238595132:web:9ea2702187b7ac041b9739",
            measurementId: "G-DE3SGYEB7P"
        };

        // 파이어베이스 실행
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // 버튼 클릭 시 작동하는 기능
        document.getElementById('search-btn').addEventListener('click', function() {
            const keyword = document.getElementById('keyword-input').value.trim();
            
            if (!keyword) {
                alert("키워드를 먼저 입력해 주세요!");
                return;
            }

            document.getElementById('results-area').style.color = "#e67e22";
            document.getElementById('results-area').innerText = `'${keyword}' 데이터를 파이어베이스로 보내는 중...`;

            // 파이어베이스 Realtime Database의 'search_keywords'라는 이름의 폴더에 저장
            const keywordListRef = ref(database, 'search_keywords'); 
            const newKeywordRef = push(keywordListRef);
            
            set(newKeywordRef, {
                word: keyword,
                time: new Date().toLocaleString() // 저장되는 시간 기록
            }).then(() => {
                // 성공적으로 저장되었을 때
                document.getElementById('results-area').style.color = "#27ae60";
                document.getElementById('results-area').innerText = `'${keyword}' 키워드가 파이어베이스에 성공적으로 저장되었습니다! 🎉`;
                document.getElementById('keyword-input').value = ''; // 입력창 비우기
            }).catch((error) => {
                // 에러가 났을 때
                document.getElementById('results-area').style.color = "#c0392b";
                document.getElementById('results-area').innerText = "저장 중 오류가 발생했습니다: " + error;
            });
        });
    </script>
</body>
</html>
